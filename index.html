<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Happy Birthday Divy 🎂</title>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --rose:    #FF6B9D;
      --blush:   #FFB3CC;
      --gold:    #FFD700;
      --cream:   #FFF5F8;
      --deep:    #C2185B;
      --soft:    #FFF0F5;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Quicksand', sans-serif;
      background: var(--cream);
      overflow-x: hidden;
      color: #333;
    }

    /* ── CONFETTI CANVAS ── */
    #confetti-canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 999;
    }

    /* ── FLOATING HEARTS ── */
    .hearts-bg {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .heart-float {
      position: absolute;
      bottom: -60px;
      font-size: 1.4rem;
      animation: floatUp linear infinite;
      opacity: 0;
    }
    @keyframes floatUp {
      0%   { transform: translateY(0) rotate(0deg); opacity: 0.7; }
      100% { transform: translateY(-110vh) rotate(25deg); opacity: 0; }
    }

    /* ── HERO ── */
    .hero {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      background: linear-gradient(160deg, #ffe0ef 0%, #fff5f8 60%, #ffd6e8 100%);
    }

    .cake-emoji {
      font-size: 5rem;
      animation: bounce 1.2s ease-in-out infinite alternate;
      display: block;
      margin-bottom: 1rem;
    }
    @keyframes bounce {
      from { transform: translateY(0); }
      to   { transform: translateY(-18px); }
    }

    .hero h1 {
      font-family: 'Great Vibes', cursive;
      font-size: clamp(3rem, 10vw, 7rem);
      color: var(--deep);
      line-height: 1.1;
      text-shadow: 2px 4px 12px rgba(194,24,91,.15);
      animation: fadeDown .9s ease both;
    }
    .hero .subtitle {
      font-size: clamp(1.1rem, 3vw, 1.6rem);
      color: var(--rose);
      margin-top: .6rem;
      font-weight: 600;
      letter-spacing: .08em;
      animation: fadeDown 1.1s ease both;
    }
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .scroll-hint {
      margin-top: 2.5rem;
      font-size: 1.8rem;
      animation: updown 1.5s ease-in-out infinite;
      color: var(--rose);
    }
    @keyframes updown {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(8px); }
    }

    /* ── MUSIC PLAYER ── */
    .music-section {
      position: relative; z-index: 1;
      background: linear-gradient(135deg, var(--deep) 0%, #e91e8c 100%);
      padding: 3rem 2rem;
      text-align: center;
      color: #fff;
    }
    .music-section h2 {
      font-family: 'Great Vibes', cursive;
      font-size: 2.8rem;
      margin-bottom: 1rem;
    }
    .music-section p {
      font-size: 1rem;
      opacity: .85;
      margin-bottom: 1.5rem;
    }

    .player-wrap {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      gap: 1.2rem;
      background: rgba(255,255,255,.12);
      border-radius: 20px;
      padding: 2rem 2.5rem;
      backdrop-filter: blur(6px);
    }
    .disc {
      width: 120px; height: 120px;
      border-radius: 50%;
      background: conic-gradient(#ff80ab, #ffd700, #ff6b9d, #c2185b, #ff80ab);
      display: flex; align-items: center; justify-content: center;
      font-size: 2.8rem;
      box-shadow: 0 0 30px rgba(255,107,157,.6);
      animation: spin 4s linear infinite paused;
      cursor: pointer;
      transition: box-shadow .3s;
    }
    .disc.playing { animation-play-state: running; box-shadow: 0 0 50px rgba(255,107,157,.9); }
    @keyframes spin { to { transform: rotate(360deg); } }

    .play-btn {
      background: #fff;
      color: var(--deep);
      border: none;
      border-radius: 50px;
      padding: .7rem 2.2rem;
      font-family: 'Quicksand', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform .2s, box-shadow .2s;
    }
    .play-btn:hover { transform: scale(1.07); box-shadow: 0 6px 18px rgba(0,0,0,.2); }

    .music-note-anim {
      font-size: 1.4rem;
      animation: noteFloat 2s ease-in-out infinite;
    }
    @keyframes noteFloat {
      0%,100% { transform: translateY(0) rotate(-8deg); opacity: 1; }
      50%      { transform: translateY(-12px) rotate(8deg); opacity: .5; }
    }

    /* ── PHOTO GRID ── */
    .photos-section {
      position: relative; z-index: 1;
      padding: 4rem 2rem;
      text-align: center;
      background: var(--soft);
    }
    .section-title {
      font-family: 'Great Vibes', cursive;
      font-size: clamp(2.2rem, 6vw, 3.5rem);
      color: var(--deep);
      margin-bottom: 2rem;
    }

    .photo-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
      max-width: 700px;
      margin: 0 auto;
    }
    .photo-card {
      position: relative;
      border-radius: 18px;
      overflow: hidden;
      aspect-ratio: 1/1;
      background: linear-gradient(135deg, var(--blush), var(--rose));
      cursor: pointer;
      box-shadow: 0 4px 18px rgba(194,24,91,.12);
      transition: transform .3s, box-shadow .3s;
    }
    .photo-card:hover { transform: scale(1.05) rotate(1.5deg); box-shadow: 0 10px 30px rgba(194,24,91,.25); }

    .photo-card input[type="file"] {
      position: absolute; inset: 0;
      opacity: 0; cursor: pointer; z-index: 3;
    }
    .photo-card img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
      position: absolute; inset: 0; z-index: 1;
    }
    .photo-card img[src^="YOUR_PHOTO"] { display: none; }
    .photo-placeholder {
      position: absolute; inset: 0; z-index: 2;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      color: #fff;
      font-size: .9rem; font-weight: 600;
      gap: .3rem;
      text-shadow: 0 1px 4px rgba(0,0,0,.2);
      transition: opacity .3s;
    }
    .photo-placeholder span { font-size: 2rem; }
    .photo-card.has-img .photo-placeholder { opacity: 0; }

    .photo-hint {
      margin-top: 1rem;
      font-size: .9rem;
      color: var(--rose);
      opacity: .8;
    }

    /* ── MESSAGE SECTION ── */
    .message-section {
      position: relative; z-index: 1;
      padding: 4rem 2rem;
      background: linear-gradient(160deg, #fff0f5, #ffe8f0);
      text-align: center;
    }
    .letter-wrap {
      max-width: 660px;
      margin: 0 auto;
      background: #fff;
      border-radius: 24px;
      padding: 2.5rem;
      box-shadow: 0 8px 40px rgba(194,24,91,.1);
      position: relative;
    }
    .letter-wrap::before {
      content: '💌';
      position: absolute;
      top: -22px; left: 50%;
      transform: translateX(-50%);
      font-size: 2.5rem;
    }
    .letter-wrap textarea {
      width: 100%;
      min-height: 200px;
      border: 2px dashed var(--blush);
      border-radius: 14px;
      padding: 1.2rem;
      font-family: 'Great Vibes', cursive;
      font-size: 1.4rem;
      color: var(--deep);
      resize: vertical;
      outline: none;
      background: var(--soft);
      transition: border-color .3s;
    }
    .letter-wrap textarea:focus { border-color: var(--rose); }
    .letter-wrap textarea::placeholder { color: #e8aac0; }

    .save-btn {
      margin-top: 1.2rem;
      background: linear-gradient(135deg, var(--rose), var(--deep));
      color: #fff;
      border: none;
      border-radius: 50px;
      padding: .8rem 2.5rem;
      font-family: 'Quicksand', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform .2s, box-shadow .2s;
    }
    .save-btn:hover { transform: scale(1.06); box-shadow: 0 6px 20px rgba(194,24,91,.35); }

    .saved-msg {
      display: none;
      margin-top: .8rem;
      color: var(--deep);
      font-weight: 600;
      animation: fadeDown .5s ease;
    }

    /* ── FOOTER ── */
    footer {
      position: relative; z-index: 1;
      text-align: center;
      padding: 2rem;
      background: var(--deep);
      color: #ffd6e8;
      font-size: 1rem;
    }
    footer .big-heart {
      font-size: 2rem;
      animation: heartbeat 1s ease-in-out infinite;
      display: inline-block;
    }
    @keyframes heartbeat {
      0%,100% { transform: scale(1); }
      50%      { transform: scale(1.3); }
    }
  </style>
</head>
<body>

<canvas id="confetti-canvas"></canvas>
<div class="hearts-bg" id="heartsContainer"></div>

<!-- HERO -->
<section class="hero">
  <span class="cake-emoji">🎂</span>
  <h1>Happy Birthday<br/>Divy!(Chikne🤤)</h1>
  <p class="subtitle">✨ You make every day magical ✨</p>
  <div class="scroll-hint">↓</div>
</section>

<!-- MUSIC -->
<section class="music-section">
  <h2>Our Song 🎵</h2>
  <p>Click the disc to play — let the music fill your heart!</p>
  <div class="player-wrap">
    <div class="disc" id="disc">🎵</div>
    <div class="music-note-anim">♫ ♪ ♫</div>
    <button class="play-btn" id="playBtn">▶ Play Birthday Song</button>
  </div>
  <!-- Royalty-free Birthday Song via a public domain MIDI/audio URL -->
  <audio id="birthdaySong" controls loop>
    <source src="song.mp3" type="audio/mpeg"/>
    <!-- fallback: browser will skip if unavailable -->
  </audio>
</section>

<!-- PHOTOS -->
<section class="photos-section">
  <h2 class="section-title">Our Memories </h2>
  <div class="photo-grid" id="photoGrid">
    <!-- ✏️ Replace each src="YOUR_PHOTO_X.jpg" with your actual image file name -->
    <div class="photo-card"><img src="https://i.ibb.co/ZRvTQfZz/Whats-App-Image-2026-06-28-at-4-12-27-PM.jpg" alt="Memory 1" onerror="this.style.display='none'"/><div class="photo-placeholder"></div></div>
    <div class="photo-card"><img src="https://i.ibb.co/BVZrw5j9/Whats-App-Image-2026-06-28-at-4-12-29-PM.jpg" alt="Memory 2" onerror="this.style.display='none'"/><div class="photo-placeholder"></div></div>
    <div class="photo-card"><img src="https://i.ibb.co/0pJYFTJ1/kghcxz.jpg" alt="Memory 3" onerror="this.style.display='none'"/><div class="photo-placeholder"></div></div>
    <div class="photo-card"><img src="https://i.ibb.co/Lztzm9t0/iohujgfx.jpg" alt="Memory 4" onerror="this.style.display='none'"/><div class="photo-placeholder"></div></div>
    <div class="photo-card"><img src="https://i.ibb.co/Z620yKq1/iljhjgfd.jpg" alt="Memory 5" onerror="this.style.display='none'"/><div class="photo-placeholder"></div></div>
    <div class="photo-card"><img src="https://i.ibb.co/vCKxV1m8/iughcv.jpg" alt="Memory 6" onerror="this.style.display='none'"/><div class="photo-placeholder"></div></div>
    <div class="photo-card"><img src="https://i.ibb.co/qFjxLkfV/Whats-App-Image-2026-06-28-at-4-12-30-PM.jpg" alt="Memory 7" onerror="this.style.display='none'"/><div class="photo-placeholder"></div></div>
    <div class="photo-card"><img src="https://i.ibb.co/Lhdp1gxM/tfcvgybhnj.jpg" alt="Memory 8" onerror="this.style.display='none'"/><div class="photo-placeholder"></div></div>
    <div class="photo-card"><img src="https://i.ibb.co/NnsLpBf9/Whats-App-Image-2026-06-28-at-4-12-28-PM.jpg" alt="Memory 9" onerror="this.style.display='none'"/><div class="photo-placeholder"></div></div>
  </div>

</section>  

<!-- MESSAGE -->
<section class="message-section">
  <h2 class="section-title">A Note for My Cutie 💝</h2>
  <div class="letter-wrap">
    <textarea id="msgArea" placeholder="Dear Divy, you are my whole world..."></textarea>
    <br/>
    <button class="save-btn" id="saveBtn">Save My Words 💖</button>
    <p class="saved-msg" id="savedMsg">Saved with all my love! 💌</p>
  </div>
</section>

<footer>
  Made with <span class="big-heart">❤️</span> just for <strong>Divy</strong> — Happy Birthday, my love! 🎉
</footer>

<script>
  /* ── FLOATING HEARTS ── */
  const hc = document.getElementById('heartsContainer');
  const EMOJIS = ['❤️','💕','💖','💗','💓','🌸','✨','💝'];
  for (let i = 0; i < 18; i++) {
    const h = document.createElement('div');
    h.className = 'heart-float';
    h.textContent = EMOJIS[Math.floor(Math.random() * EMOJIS.length)];
    h.style.left = Math.random() * 100 + 'vw';
    h.style.fontSize = (1 + Math.random() * 1.2) + 'rem';
    h.style.animationDuration = (6 + Math.random() * 10) + 's';
    h.style.animationDelay = (Math.random() * 8) + 's';
    hc.appendChild(h);
  }

  /* ── CONFETTI ── */
  const canvas = document.getElementById('confetti-canvas');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  window.addEventListener('resize', () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  });
  const COLORS = ['#FF6B9D','#FFD700','#C2185B','#FF80AB','#FFF176','#64B5F6'];
  const pieces = Array.from({length: 90}, () => ({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height - canvas.height,
    w: 6 + Math.random() * 8,
    h: 10 + Math.random() * 6,
    color: COLORS[Math.floor(Math.random() * COLORS.length)],
    rot: Math.random() * 360,
    speed: 1.5 + Math.random() * 2.5,
    drift: (Math.random() - .5) * 1.5,
    spin: (Math.random() - .5) * 4,
  }));
  (function loop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    pieces.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot * Math.PI / 180);
      ctx.fillStyle = p.color;
      ctx.globalAlpha = .85;
      ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
      ctx.restore();
      p.y += p.speed;
      p.x += p.drift;
      p.rot += p.spin;
      if (p.y > canvas.height + 20) {
        p.y = -20;
        p.x = Math.random() * canvas.width;
      }
    });
    requestAnimationFrame(loop);
  })();

  /* ── MUSIC PLAYER ── */
  const song = document.getElementById('birthdaySong');
  const disc = document.getElementById('disc');
  const playBtn = document.getElementById('playBtn');
  let playing = false;

  // Try autoplay silently
  song.play().then(() => {
    playing = true;
    disc.classList.add('playing');
    playBtn.textContent = '⏸ Pause';
  }).catch(() => {});

  function togglePlay() {
    if (playing) {
      song.pause();
      disc.classList.remove('playing');
      playBtn.textContent = '▶ Play Birthday Song';
    } else {
      song.play();
      disc.classList.add('playing');
      playBtn.textContent = '⏸ Pause';
    }
    playing = !playing;
  }
  disc.addEventListener('click', togglePlay);
  playBtn.addEventListener('click', togglePlay);

  /* ── PHOTO GRID — replace src values with your own image paths ── */

  /* ── SAVE MESSAGE ── */
  const saveBtn = document.getElementById('saveBtn');
  const savedMsg = document.getElementById('savedMsg');
  const msgArea = document.getElementById('msgArea');

  // Load previously saved message or use default
  const saved = localStorage.getItem('divy_msg');
  if (saved) {
    msgArea.value = saved;
  } else {
    msgArea.value = `Dear Divy, 💟

I still remember the very first time we met 👀🥰 — how I fell in love with you and your smile 😄✨️ & how everything happened so unexpectedly 🌸. We both didn't expect any of this... it was God who made it happen 🤗✨️.
I am beyond blessed 🌸 & thankful that someone like you came into my life 😭💟.
Thank You... 🥰 Thank you for making me realize & making me feel that I deserve to be loved 💟, to be happy 😄, and to have someone as amazing as you are ✨️!!!
I Love You, Divy 💟 — Always & Forever 🌸✨️
    `;

  saveBtn.addEventListener('click', () => {
    localStorage.setItem('divy_msg', msgArea.value);
    savedMsg.style.display = 'block';
    setTimeout(() => savedMsg.style.display = 'none', 3000);
  });
  }
</script>
</body>
</html>
